<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body style="margin: 12px; padding: 5px;">
    <div class="container">
        <!-- *No Custumize Color tem esse comando a seguir -->
        <div class="p-3 text-primary-emphasis bg-primary-subtle border border-primary-subtle rounded-3">
            Criar um botão que abre um , onde o usuário digita informações e vê o resultado na tela.
            Campos: Nome, Idade, E-mail
            Botão: Salvar
            Quando clicar no botão, utilizar um Alert para informar que o Cadastro foi salvo com sucesso.
        </div>

        <br>
        <!-- Button trigger modal -->
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
            iniciar Cadastro.
        </button>

        <!-- Modal e cadastramento-->
        <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="exampleModalLabel">Cadastro Inicial</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                            <div id = "mensagem" class="alert alert-success" role="alert" style = "display: none;">
                            
                            </div>
                        <div class="input-group mb-3">
                            <span class="input-group-text" id="basic-addon1">🙋</span>
                            <input id = "nome" type="text" class="form-control" placeholder="Nome completo" aria-label="Username"
                                aria-describedby="basic-addon1">
                        </div>

                        <div class="input-group mb-3">
                            <input id = "email" type="text" class="form-control" placeholder="Seu E-email"
                                aria-label="Recipient’s username" aria-describedby="basic-addon2">
                            <span class="input-group-text" id="basic-addon2">📩</span>
                        </div>

                            <div class="input-group mb-3">
                                <span class="input-group-text">🎂</span>
                                <input id = "idade" type="number" class="form-control" aria-label="Idade">
                                <span class="input-group-text">idade</span>
                            </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                        <button type="button" class="btn btn-primary" onclick="salvar()">Salvar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="modal.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
