  <head>

      rel="stylesheet"

    />
    <link

    />
    <link
      rel="stylesheet"
      href="node_modules/bootstrap/dist/css/bootstrap-grid.rtl.css"
    />
    <link
      rel="stylesheet"
      href="node_modules/bootstrap/dist/css/bootstrap-grid.rtl.min.css"
    />
    <link
      rel="stylesheet"
      href="node_modules/bootstrap/dist/css/bootstrap-utilities.css"
    />
    <link

    <link

  </head>
  <body>
    <div class="container">
      <div
        id="alerta"
        class="alert alert-warning alert-dismissible fade show"
        role="alert"
        style="display: none"
      >
        <strong>Atenção!</strong> Sou um alerta com o Close-Fechar
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
          aria-label="Close"
        ></button>
      </div>

      <button type="button" class="btn btn-primary" onclick="alerta()">
        Clica Aqui
      </button>

      <br /><br />
      <hr />
      <br />

      <div class="input-group mb-3">
        <span class="input-group-text">R$</span>
        <input id="num01" type="text" class="form-control" aria-label="Valor" />
        <span class="input-group-text">.00</span>
      </div>

      <div class="input-group mb-3">
        <span class="input-group-text">R$</span>
        <input id="num02" type="text" class="form-control" aria-label="Valor" />
        <span class="input-group-text">.00</span>
      </div>

      <div id="resultado" class="alert alert-secondary" role="alert"></div>
      <button type="button" class="btn btn-success" onclick="calcular()">
        Somar
      </button>
    </div>

    <script src="node_modules/bootstrap/dist/js/bootstrap.js"></script>
    <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.js"></script>
    <script src="node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
    <script src="node_modules/bootstrap/dist/js/bootstrap."></script>

    <script src="alerta.js"></script>
  </body>
</html>
