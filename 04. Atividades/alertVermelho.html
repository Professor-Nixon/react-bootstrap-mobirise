<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alert Vermelho</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container">
        <div id = "alertaVermelho" style="display:none" class="alert alert-danger" role="alert">
            Sou um alert vermelho! <br>
            Alerta severo de chuvas fortes.
        </div>

        <button onclick="mostrarAlerta()" type="button" class="btn btn-danger">
            Alerta Vermelho
        </button>
        <button onclick="ocultarAlerta()" type="button" class="btn btn-success">
            Ocultar Alerta
        </button>
      
    </div>

    </div>

    <script src="alertVermelho.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
