<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinal</title>
    <link rel="stylesheet" href="sinalTransito.css">
    <!-- Link do CSS do BootStrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <!-- Classe que centraliza o conteúdo -->
    <div class="container">

        <!-- Classe onde estrão as cores do semáforo -->
        <div class="semaforo">
            <!-- Botão para selecionar as cores -->
            <div class="select">
                <select id="escolhaCores" onclick="escolherCor()">
                    <option value="Selecione">Selecione</option>
                    <option value="verde">Verde</option>
                    <option value="amarelo">Amarelo</option>
                    <option value="vermelho">Vermelho</option>
                </select>
            </div>
            <!-- As cores do semáforo -->
            <div class="cores">
                <div id="corVerde" class="bg-success">Siga</div>
                <div id="corAmarelo" class="bg-warning">Calma</div>
                <div id="corVermelho" class="bg-danger">Pare</div>
            </div>
        </div>
    </div>
    
    <script src="sinalTransito.js"></script>
    <!-- Link do JS do BootStrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
