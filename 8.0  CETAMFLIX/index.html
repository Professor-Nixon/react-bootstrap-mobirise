<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Carousel com múltiplas imagens</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

</head>

<body>

  <h2>Descubra suas próximas histórias</h2>

  <div id="carouselFilmes" class="carousel slide" data-bs-ride="carousel">

    <div class="carousel-inner">

      <!-- SLIDE 1 -->
      <div class="carousel-item active">
        <div class="container">
          <div class="row g-3">

            <div class="col-6 col-md-3">
              <img src="https://picsum.photos/id/1011/400/300" class="d-block w-100">
            </div>

            <div class="col-6 col-md-3">
              <img src="https://picsum.photos/id/1015/400/300" class="d-block w-100">
            </div>

            <div class="col-6 col-md-3">
              <img src="https://picsum.photos/id/1016/400/300" class="d-block w-100">
            </div>

            <div class="col-6 col-md-3">
              <img src="https://picsum.photos/id/1020/400/300" class="d-block w-100">
            </div>

          </div>
        </div>
      </div>

      <!-- SLIDE 2 -->
      <div class="carousel-item">
        <div class="container">
          <div class="row g-3">

            <div class="col-6 col-md-3">
              <img src="https://picsum.photos/id/1024/400/300" class="d-block w-100">
            </div>

            <div class="col-6 col-md-3">
              <img src="https://picsum.photos/id/1027/400/300" class="d-block w-100">
            </div>

            <div class="col-6 col-md-3">
              <img src="https://picsum.photos/id/1035/400/300" class="d-block w-100">
            </div>

            <div class="col-6 col-md-3">
              <img src="https://picsum.photos/id/1039/400/300" class="d-block w-100">
            </div>

          </div>
        </div>
      </div>

      <!-- SLIDE 3 -->
      <div class="carousel-item">
        <div class="container">
          <div class="row g-3">

            <div class="col-6 col-md-3">
              <img src="https://picsum.photos/id/1043/400/300" class="d-block w-100">
            </div>

            <div class="col-6 col-md-3">
              <img src="https://picsum.photos/id/1050/400/300" class="d-block w-100">
            </div>

            <div class="col-6 col-md-3">
              <img src="https://picsum.photos/id/1060/400/300" class="d-block w-100">
            </div>

            <div class="col-6 col-md-3">
              <img src="https://picsum.photos/id/1069/400/300" class="d-block w-100">
            </div>

          </div>
        </div>
      </div>

    </div>

    <!-- BOTÕES -->
    <button class="carousel-control-prev" type="button" data-bs-target="#carouselFilmes" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#carouselFilmes" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>

  </div>

  <!-- JS Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
